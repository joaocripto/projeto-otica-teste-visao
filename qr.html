<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Teste de Visão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin: 0 0 20px 0;
        }
        #qrcode {
            margin: 30px auto;
            padding: 20px;
            background: white;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        button:hover {
            background: #764ba2;
        }
        .url {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            word-break: break-all;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR Code - Teste de Visão</h1>

        <div class="url">
            https://projeto-de-otica-capitacao-de-leads.vercel.app
        </div>

        <div id="qrcode"></div>

        <div>
            <button onclick="downloadQR()">📥 Baixar</button>
            <button onclick="printQR()">🖨️ Imprimir</button>
            <button onclick="copyURL()">📋 Copiar URL</button>
        </div>
    </div>

    <script>
        const url = 'https://projeto-de-otica-capitacao-de-leads.vercel.app';

        new QRCode(document.getElementById('qrcode'), {
            text: url,
            width: 350,
            height: 350,
            colorDark: '#667eea',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'qr-code-teste-visao.png';
                link.click();
            }
        }

        function printQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const img = canvas.toDataURL('image/png');
                const w = window.open('');
                w.document.write('<img src="' + img + '" style="width: 100%;">');
                w.print();
            }
        }

        function copyURL() {
            navigator.clipboard.writeText(url);
            alert('URL copiada!');
        }
    </script>
</body>
</html>
